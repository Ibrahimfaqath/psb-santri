<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin PSB</title>
</head>

<body>
    <div id="loginArea">
        <h2>login Admin</h2>
        <input type="text" id="user" placeholder="Username"><br><br>
        <input type="password" id="pass" placeholder="Password"><br><br>
        <button onclick="login()">Masuk</button>
    </div>

    <div id="adminContent" style="display:none;">
        <h2>Data Pendaftar Santri</h2>
        <button onclick="logout()">Logout</button>
        <hr>
        <table border="1" cellpadding="10" id="tabelSantri">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Gender</th>
                    <th>Hafalan</th>
                    <th>Wali</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function login() {
            const formData = new FormData();
            formData.append('username', document.getElementById('user').value);
            formData.append('password', document.getElementById('pass').value);

            const res = await fetch('/api/login', { method: 'POST', body: formData, credentials: 'include' });
            if (res.ok) {
                checkAuth();
            } else {
                alert("Login Gagal!");
            }
        }

        async function checkAuth() {
            const res = await fetch('/api/admin/santri', {
                credentials: 'include'
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';

                const tbody = document.querySelector('#tabelSantri tbody');
                tbody.innerHTML = data.map(s => `
                  <tr>
                    <td>${s.nama}</td>
                    <td>${s.gender}</td>
                    <td>${s.hafalan}</td>
                    <td>${s.wali}</td>
                  </tr>  
                `).join('');
            }
        }

        async function logout() {
            await fetch('/api/logout', {
                credentials: 'include'
            });
            location.reload();
        }

        // Cek status saat halaman dibuka
        checkAuth();
    </script>
</body>

</html>
