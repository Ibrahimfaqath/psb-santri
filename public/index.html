<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSB Digital - Santri Baru</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        :root {
            --bg: #0a0c10;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0a0c10);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.75rem; margin: 0; background: linear-gradient(to right, #60a5fa, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }

        .input-group { margin-bottom: 1.25rem; position: relative; }
        .input-group label { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        
        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px var(--primary-glow);
            margin-top: 1rem;
        }

        .btn-submit:hover { transform: translateY(-2px); background: #2563eb; }
        .btn-submit:active { transform: translateY(0); }

        #statusPesan { font-size: 0.85rem; text-align: center; margin-top: 1rem; font-weight: 500; }
        .g-recaptcha { display: flex; justify-content: center; transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Pendaftaran Santri</h1>
            <p>Mulai perjalanan spiritual Anda di sini.</p>
        </div>

        <form id="formPSB">
            <div class="input-group">
                <label><i data-lucide="user" size="16"></i> Nama Lengkap</label>
                <input type="text" name="nama" placeholder="Ahmad Fauzi" required>
            </div>

            <div class="input-group">
                <label><i data-lucide="venus-mars" size="16"></i> Jenis Kelamin</label>
                <select name="gender" required>
                    <option value="">Pilih Gender</option>
                    <option value="Ikhwan">Ikhwan (Laki-laki)</option>
                    <option value="Akhwat">Akhwat (Perempuan)</option>
                </select>
            </div>

            <div class="input-group">
                <label><i data-lucide="book-open" size="16"></i> Jumlah Hafalan (Juz)</label>
                <input type="number" name="hafalan" value="0" min="0" max="30">
            </div>

            <div class="input-group">
                <label><i data-lucide="users" size="16"></i> Nama Wali</label>
                <input type="text" name="wali" placeholder="Nama Ayah/Ibu" required>
            </div>

            <div class="g-recaptcha" data-sitekey="6LdWrLQsAAAAAHDLtIGpHldhgmw0v7pkHlBVhL5i"></div>
            
            <button type="submit" id="btnSubmit" class="btn-submit">Kirim Pendaftaran</button>
        </form>

        <div id="statusPesan"></div>
    </div>

    <script>
        lucide.createIcons();
        const form = document.getElementById('formPSB');
        const statusPesan = document.getElementById('statusPesan');

        form.onsubmit = async (e) => {
            e.preventDefault();
            statusPesan.innerText = "Processing...";
            statusPesan.style.color = "#3b82f6";

            const formData = new FormData(form);
            try {
                const response = await fetch('/api/submit', { method: 'POST', body: formData });
                const hasil = await response.json();
                if (response.ok) {
                    statusPesan.innerText = "✨ " + hasil.message;
                    statusPesan.style.color = "#10b981";
                    form.reset();
                    grecaptcha.reset();
                } else {
                    statusPesan.innerText = "❌ " + (hasil.error || "Gagal mengirim.");
                    statusPesan.style.color = "#ef4444";
                }
            } catch (error) {
                statusPesan.innerText = "Server Error.";
                statusPesan.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
