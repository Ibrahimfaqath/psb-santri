<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Santri Baru</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <h1>Formulir Pendaftaran Santri Baru</h1>
    <p>Silakan isi data calon santri dengan benar.</p>
    <hr>

    <form id="formPSB">
        <div>
            <label>Nama Lengkap:</label><br>
            <input type="text" name="nama" placeholder="Contoh: Ahmad Fauzi" required>
        </div><br>

        <div>
            <label>Jenis Kelamin:</label><br>
            <select name="gender" required>
                <option value="">-- Pilih --</option>
                <option value="Ikhwan">Ikhwan (Laki-laki)</option>
                <option value="Akhwat">Akhwat (Perempuan)</option>
            </select>
        </div><br>

        <div>
            <label>Jumlah Hafalan (Juz):</label><br>
            <input type="number" name="hafalan" value="0" min="0" max="30">
        </div><br>

        <div>
            <label>Nama Wali:</label><br>
            <input type="text" name="wali" placeholder="Nama Ayah/Ibu" required>
        </div><br>

        <div class="g-recaptcha" data-sitekey="6LeqlLEsAAAAAB-0cwMA3IbhKf8A-T-RznsAfLpQ"></div>
        <br>

        <button type="submit" id="btnSubmit">Kirim Pendaftaran</button>
    </form>

    <h3 id="statusPesan"></h3>

    <script>
        const form = document.getElementById('formPSB');
        const statusPesan = document.getElementById('statusPesan');

        form.onsubmit = async (e) => {
            e.preventDefault(); // Mencegah halaman refresh

            statusPesan.innerText = "Sedang memproses...";
            statusPesan.style.color = "blue";

            const formData = new FormData(form);

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    body: formData
                });

                const hasil = await response.json();

                if (response.ok) {
                    statusPesan.innerText = "Berhasil: " + hasil.message;
                    statusPesan.style.color = "green";
                    form.reset(); // kosongkan form
                    grecaptcha.reset(); // Kosongkan centang captcha
                } else {
                    statusPesan.innerText = "Gagal: " + (hasil.error || "Terjadi Kesalahan");
                    statusPesan.style.color = "red";
                }
            } catch (error) {
                statusPesan.innerText = "Gagal menghubungi server backend.";
                statusPesan.style.color = "red";
            }
        }
    </script>
</body>
</html>
